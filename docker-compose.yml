version: '3.8'

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assignment_botmakers
    ports:
      - "5433:5432"

  backend:
    build:
      context: ./backend/AssignmentBotmakers
      dockerfile: dockerfile
    container_name: assignment_botmaker_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/assignment_botmakers
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: assignment_botmaker_frontend
    ports:
     - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_BACKEND_URL=http://localhost:8080/api